services:
  - type: web
    name: abunelik-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_USER
        sync: false
      - key: API_PASSWORD
        sync: false
      - key: PORT
        value: 3000
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        value: abbassultanli71@gmail.com
