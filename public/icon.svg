<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Dark Premium Gradient -->
    <linearGradient id="abuneBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1d24"/>
      <stop offset="100%" stop-color="#0f1015"/>
    </linearGradient>
    
    <!-- Signature Vibrant Brand Gradient -->
    <linearGradient id="abuneBrandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <!-- Accent Dot Glow -->
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Squircle Base Canvas -->
  <rect width="512" height="512" rx="118" fill="url(#abuneBg)" stroke="rgba(249, 115, 22, 0.18)" stroke-width="6"/>

  <!-- Minimalist 'A' + Infinity Loop Signature Mark -->
  <!-- Left Leg to Peak to Right Leg -->
  <path d="M 155 350 L 256 160 L 357 350" stroke="url(#abuneBrandGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Seamless Infinity Wave Crossbar (Loop of Recurring Subscriptions) -->
  <path d="M 195 285 C 220 240, 292 330, 317 285" stroke="url(#abuneBrandGrad)" stroke-width="32" stroke-linecap="round" fill="none"/>

  <!-- Smart Notification Apex Dot -->
  <circle cx="256" cy="115" r="26" fill="url(#dotGrad)"/>
  <circle cx="256" cy="115" r="38" fill="#f59e0b" opacity="0.25"/>
</svg>
