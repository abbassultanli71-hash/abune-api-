<svg xmlns="http://www.w3.org/2000/svg" width="940" height="850" viewBox="0 0 940 850">
  <defs>
    <!-- Solid Arrowhead for Associations -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5" fill="none" stroke="#f2711c" stroke-width="1.8" stroke-linecap="round"/>
    </marker>
    <!-- Dashed Arrowhead for Dependencies -->
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5" fill="none" stroke="#f2711c" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <!-- Background Grid Pattern for Technical Feel -->
  <rect width="940" height="850" fill="#ffffff" />
  <g stroke="#eaeaea" stroke-width="0.5">
    <path d="M 0 50 L 940 50 M 0 100 L 940 100 M 0 150 L 940 150 M 0 200 L 940 200 M 0 250 L 940 250 M 0 300 L 940 300 M 0 350 L 940 350 M 0 400 L 940 400 M 0 450 L 940 450 M 0 500 L 940 500 M 0 550 L 940 550 M 0 600 L 940 600 M 0 650 L 940 650 M 0 700 L 940 700 M 0 750 L 940 750 M 0 800 L 940 800" />
    <path d="M 50 0 L 50 850 M 100 0 L 100 850 M 150 0 L 150 850 M 200 0 L 200 850 M 250 0 L 250 850 M 300 0 L 300 850 M 350 0 L 350 850 M 400 0 L 400 850 M 450 0 L 450 850 M 500 0 L 500 850 M 550 0 L 550 850 M 600 0 L 600 850 M 650 0 L 650 850 M 700 0 L 700 850 M 750 0 L 750 850 M 800 0 L 800 850 M 850 0 L 850 850 M 900 0 L 900 850" />
  </g>

  <!-- Left Actor: User (İstifadəçi) -->
  <g id="UserActor">
    <!-- Head -->
    <circle cx="65" cy="390" r="10" stroke="#0033aa" stroke-width="2.5" fill="#f2711c" />
    <!-- Body -->
    <line x1="65" y1="400" x2="65" y2="440" stroke="#0033aa" stroke-width="2.5" />
    <!-- Arms -->
    <line x1="45" y1="412" x2="85" y2="412" stroke="#0033aa" stroke-width="2.5" />
    <!-- Legs -->
    <line x1="65" y1="440" x2="52" y2="475" stroke="#0033aa" stroke-width="2.5" />
    <line x1="65" y1="440" x2="78" y2="475" stroke="#0033aa" stroke-width="2.5" />
    <!-- Label -->
    <text x="65" y="495" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#002266">İstifadəçi</text>
  </g>

  <!-- Right Actor: Sistem / Cron Job -->
  <g id="SystemActor">
    <circle cx="875" cy="270" r="10" stroke="#0033aa" stroke-width="2.5" fill="#f2711c" />
    <line x1="875" y1="280" x2="875" y2="320" stroke="#0033aa" stroke-width="2.5" />
    <line x1="855" y1="292" x2="895" y2="292" stroke="#0033aa" stroke-width="2.5" />
    <line x1="875" y1="320" x2="862" y2="355" stroke="#0033aa" stroke-width="2.5" />
    <line x1="875" y1="320" x2="888" y2="355" stroke="#0033aa" stroke-width="2.5" />
    <text x="875" y="375" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#002266">Sistem / Cron</text>
  </g>

  <!-- Right Actor 2: SMTP Mail -->
  <g id="MailActor">
    <circle cx="875" cy="510" r="10" stroke="#0033aa" stroke-width="2.5" fill="#f2711c" />
    <line x1="875" y1="520" x2="875" y2="560" stroke="#0033aa" stroke-width="2.5" />
    <line x1="855" y1="532" x2="895" y2="532" stroke="#0033aa" stroke-width="2.5" />
    <line x1="875" y1="560" x2="862" y2="595" stroke="#0033aa" stroke-width="2.5" />
    <line x1="875" y1="560" x2="888" y2="595" stroke="#0033aa" stroke-width="2.5" />
    <text x="875" y="615" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#002266">SMTP Mail</text>
  </g>

  <!-- System Boundary Rectangle -->
  <rect x="140" y="30" width="650" height="790" fill="#ffffff" stroke="#002266" stroke-width="2" />
  
  <!-- Boundary Header Tab -->
  <path d="M 140 30 L 390 30 L 370 65 L 140 65 Z" fill="#f2f5fa" stroke="#002266" stroke-width="2" />
  <text x="255" y="52" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#002266">Abunəlik idarəetməsi - use cases</text>

  <!-- ================= ASSOCIATIONS (User to Ovals) ================= -->
  <g id="Associations" stroke="#f2711c" stroke-width="1.3" fill="none">
    <line x1="85" y1="410" x2="215" y2="125" marker-end="url(#arrow)" />
    <line x1="85" y1="415" x2="215" y2="225" marker-end="url(#arrow)" />
    <line x1="85" y1="420" x2="215" y2="325" marker-end="url(#arrow)" />
    <line x1="85" y1="425" x2="215" y2="425" marker-end="url(#arrow)" />
    <line x1="85" y1="430" x2="215" y2="525" marker-end="url(#arrow)" />
    <line x1="85" y1="435" x2="215" y2="625" marker-end="url(#arrow)" />
    <line x1="85" y1="440" x2="215" y2="725" marker-end="url(#arrow)" />

    <!-- User to Right Column Ovals -->
    <line x1="85" y1="412" x2="505" y2="175" marker-end="url(#arrow)" />
    <line x1="85" y1="415" x2="505" y2="275" marker-end="url(#arrow)" />
    <line x1="85" y1="425" x2="505" y2="495" marker-end="url(#arrow)" />
    <line x1="85" y1="430" x2="505" y2="595" marker-end="url(#arrow)" />
    <line x1="85" y1="435" x2="505" y2="695" marker-end="url(#arrow)" />

    <!-- Right Actors to Ovals -->
    <line x1="845" y1="300" x2="705" y2="685" marker-end="url(#arrow)" />
    <line x1="845" y1="530" x2="705" y2="692" marker-end="url(#arrow)" />
  </g>

  <!-- ================= DEPENDENCIES (Dashed arrows between Ovals) ================= -->
  <g id="Dependencies" stroke="#f2711c" stroke-width="1.3" fill="none">
    <!-- UC_Sub_Add (310, 330) to UC_Budget_Warn (600, 390) -->
    <line x1="410" y1="335" x2="505" y2="375" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)" />
    
    <!-- UC_Sub_Add (310, 330) to UC_Notification (600, 710) -->
    <path d="M 405 340 C 475 400 480 500 515 675" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)" />
  </g>

  <!-- Labels for dependencies -->
  <text x="460" y="348" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="bold" fill="#002266">&lt;&lt;extend&gt;&gt;</text>
  <text x="450" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="bold" fill="#002266">&lt;&lt;include&gt;&gt;</text>

  <!-- ================= USE CASES (Orange Ellipses) ================= -->
  <!-- Left Column (X: 310) -->
  <g class="usecases-left" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#000000">
    <!-- 1. Auth -->
    <ellipse cx="310" cy="120" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="310" y="124">Sistemə Giriş / Qeydiyyat</text>

    <!-- 2. Sub List -->
    <ellipse cx="310" cy="220" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="310" y="224">Abunəlikləri Siyahılamaq</text>

    <!-- 3. Sub Add -->
    <ellipse cx="310" cy="320" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="310" y="324">Yeni Abunəlik Əlavə Etmək</text>

    <!-- 4. Sub Edit -->
    <ellipse cx="310" cy="420" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="310" y="424">Abunəliyi Redaktə / Silmək</text>

    <!-- 5. History -->
    <ellipse cx="310" cy="520" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="310" y="524">Ödəniş Tarixçəsini İzləmək</text>

    <!-- 6. Analytics -->
    <ellipse cx="310" cy="620" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="310" y="624">Xərclərin Analitikası</text>

    <!-- 7. Settings -->
    <ellipse cx="310" cy="720" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="310" y="724">Profil və Ayarlar</text>
  </g>

  <!-- Right Column (X: 600) -->
  <g class="usecases-right" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#000000">
    <!-- 1. Pay -->
    <ellipse cx="600" cy="170" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="600" y="174">Ödəniş Metodlarını İdarə Etmək</text>

    <!-- 2. Budget -->
    <ellipse cx="600" cy="270" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="600" y="274">Aylıq Büdcə Limitinin Təyini</text>

    <!-- 3. Budget Warn -->
    <ellipse cx="600" cy="380" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="600" y="384">Büdcə Aşımı Xəbərdarlığı</text>

    <!-- 4. Share Send -->
    <ellipse cx="600" cy="490" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="600" y="494">Tərəfdaş Dəvəti Göndərmək</text>

    <!-- 5. Share Accept -->
    <ellipse cx="600" cy="600" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="600" y="604">Dəvəti Cavablandırmaq</text>

    <!-- 6. Notification -->
    <ellipse cx="600" cy="700" rx="95" ry="32" fill="#ff7f0e" stroke="#0033aa" stroke-width="1.5" />
    <text x="600" y="704">Bildirişləri Oxumaq</text>
  </g>

</svg>
