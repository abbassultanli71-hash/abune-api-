<svg xmlns="http://www.w3.org/2000/svg" width="750" height="700" viewBox="0 0 750 700">
  <!-- Background -->
  <rect width="750" height="700" fill="#ffffff" />
  
  <defs>
    <!-- Solid Line Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 Z" fill="#333333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="375" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333">Subscription Platform (Abunəm) — System Context Diagram (C1)</text>

  <!-- ================= 1. USER (Person - Dark Blue) ================= -->
  <g transform="translate(285, 60)">
    <rect width="180" height="85" fill="#08427b" stroke="#05325c" stroke-width="1.5" rx="3" />
    <!-- Stick Figure / Person Icon -->
    <circle cx="90" cy="22" r="7" fill="#ffffff" />
    <path d="M 80 40 Q 90 28 100 40 Z" fill="#ffffff" />
    <text x="90" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">İstifadəçi</text>
    <text x="90" y="67" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Abunəliklərini idarə edir</text>
  </g>

  <!-- ================= 2. SYSTEM (Software System - Blue) ================= -->
  <g transform="translate(260, 240)">
    <rect width="230" height="95" fill="#378ADD" stroke="#185FA5" stroke-width="2" rx="3" />
    <text x="115" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">&lt;&lt;software_system&gt;&gt;</text>
    <text x="115" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff">Abunəlik Platforması (Abunəm)</text>
    <text x="115" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">İstifadəçilərə abunəliklərini izləməyə</text>
    <text x="115" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">və büdcə limitləri təyin etməyə imkan verir</text>
  </g>

  <!-- ================= 3. EMAIL SERVICE (External - Orange) ================= -->
  <g transform="translate(80, 460)">
    <rect width="200" height="85" fill="#EF9F27" stroke="#BA7517" stroke-width="1.5" rx="3" />
    <text x="100" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#412402">&lt;&lt;external_system&gt;&gt;</text>
    <text x="100" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#412402">E-poçt Xidməti</text>
    <text x="100" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#412402">Ödəniş xəbərdarlığı</text>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#412402">emaillərini çatdırır</text>
  </g>

  <!-- ================= 4. TELEGRAM BOT API (External - Orange) ================= -->
  <g transform="translate(470, 460)">
    <rect width="200" height="85" fill="#EF9F27" stroke="#BA7517" stroke-width="1.5" rx="3" />
    <text x="100" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#412402">&lt;&lt;external_system&gt;&gt;</text>
    <text x="100" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#412402">Telegram Bot API</text>
    <text x="100" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#412402">Telegram vasitəsilə ödəniş</text>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#412402">xəbərdarlıq mesajlarını çatdırır</text>
  </g>

  <!-- ================= CONNECTIONS (Orthogonal, Zero Overlaps) ================= -->
  <g stroke="#333333" stroke-width="1.1" fill="none">
    <!-- User to System -->
    <line x1="375" y1="145" x2="375" y2="235" marker-end="url(#arrow)" />
    
    <!-- System to Email Service -->
    <path d="M 320 335 L 320 400 L 180 400 L 180 455" marker-end="url(#arrow)" />
    
    <!-- System to Telegram Bot -->
    <path d="M 430 335 L 430 400 L 570 400 L 570 455" marker-end="url(#arrow)" />

    <!-- Email to User -->
    <path d="M 80 500 L 40 500 L 40 102 L 280 102" marker-end="url(#arrow)" stroke-dasharray="3,3" />

    <!-- Telegram to User -->
    <path d="M 670 500 L 710 500 L 710 102 L 285 102" marker-end="url(#arrow)" stroke-dasharray="3,3" />
  </g>

  <!-- Labels -->
  <g font-family="Arial, sans-serif" font-size="8.5" fill="#333333" font-weight="bold">
    <text x="385" y="195">İstifadə edir [HTTPS]</text>
    <text x="195" y="392">Bildiriş göndərir [SMTP]</text>
    <text x="445" y="392">Bildiriş göndərir [Bot API]</text>
    <text x="50" y="125">Çatdırır [Email]</text>
    <text x="615" y="125">Çatdırır [Telegram]</text>
  </g>
</svg>
